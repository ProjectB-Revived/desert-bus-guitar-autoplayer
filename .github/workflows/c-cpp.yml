name: Build and Release V2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -G Ninja

      - name: Build
        run: cmake --build build --config Release

      - name: Generate Random Name
        id: random_name
        shell: bash
        run: |
          RANDNAME=$(head /dev/urandom | tr -dc 'a-z0-9' | head -c 8)
          echo "name=$RANDNAME" >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.random_name.outputs.name }}
          name: Release ${{ steps.random_name.outputs.name }}
          files: |
            build/Release/DesertBusAutoPlayer.exe
            build/DesertBusAutoPlayer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
